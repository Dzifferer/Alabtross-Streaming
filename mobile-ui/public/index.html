<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="referrer" content="no-referrer">
  <title>Alabtross</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-bar-left">
        <button id="back-btn" class="icon-btn hidden" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 id="page-title">Alabtross</h1>
      </div>
      <div class="top-bar-right">
        <button id="search-toggle" class="icon-btn" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button id="settings-toggle" class="icon-btn" aria-label="Settings">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Search Bar (hidden by default) -->
    <div id="search-bar" class="hidden">
      <div class="search-input-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="search-input" placeholder="Search movies, series..." autocomplete="off">
        <button id="search-clear" class="icon-btn-sm hidden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <main id="content">
      <!-- Home View -->
      <div id="view-home" class="view active">
        <div id="home-loading" class="loading-state">
          <div class="spinner"></div>
          <p>Loading catalogs...</p>
        </div>
        <div id="home-catalogs"></div>
      </div>

      <!-- Search Results View -->
      <div id="view-search" class="view">
        <div id="search-results" class="grid-view"></div>
        <div id="search-empty" class="empty-state hidden">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <p>Search for movies and TV series</p>
        </div>
      </div>

      <!-- Detail View -->
      <div id="view-detail" class="view">
        <div id="detail-content"></div>
      </div>

      <!-- Settings View -->
      <div id="view-settings" class="view">
        <div class="settings-panel">
          <h2>Settings</h2>

          <div class="setting-group">
            <label>Stremio Server</label>
            <div class="setting-row">
              <input type="text" id="setting-server" placeholder="http://192.168.1.x:11470">
              <button id="setting-server-test" class="btn-sm">Test</button>
            </div>
            <span id="server-status" class="setting-hint">Not tested</span>
          </div>

          <div class="setting-group">
            <label>Addons</label>
            <div id="addon-list" class="addon-list">
              <p class="setting-hint">Configure your Stremio addons below</p>
            </div>
            <div class="setting-row">
              <input type="text" id="addon-url-input" placeholder="Addon manifest URL...">
              <button id="addon-add-btn" class="btn-sm">Add</button>
            </div>
          </div>

          <div class="setting-group">
            <label>Default Addons</label>
            <button id="addon-add-cinemeta" class="btn-block">Add Cinemeta (Metadata)</button>
            <button id="addon-add-torrentio" class="btn-block">Add Torrentio (Streams)</button>
          </div>

          <div class="setting-group">
            <label>About</label>
            <p class="setting-hint">Alabtross Mobile v1.0 — A lightweight mobile interface for your Stremio streaming server running on Jetson Orin Nano.</p>
          </div>
        </div>
      </div>

      <!-- Player View -->
      <div id="view-player" class="view">
        <div id="player-container">
          <video id="video-player" playsinline controls></video>
          <div id="player-overlay" class="hidden">
            <div class="spinner"></div>
            <p>Loading stream...</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="movies">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg>
        <span>Movies</span>
      </button>
      <button class="nav-btn" data-view="series">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span>Series</span>
      </button>
    </nav>
  </div>

  <script defer src="/js/api.js"></script>
  <script defer src="/js/app.js"></script>
</body>
</html>
