plugins {
    id 'com.android.application'
}

android {
    namespace 'com.albatross.firetv'
    compileSdk 34

    defaultConfig {
        applicationId "com.albatross.firetv"
        // 21 covers every Fire TV currently in the wild (Fire OS 5+).
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
